<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnLink — Экшен-план</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafafa; color: #1a1a1a; }

        /* Login */
        #login-screen {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; background: #f5f5f5;
        }
        #login-box {
            background: white; padding: 48px; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; max-width: 400px;
        }
        #login-box h1 { font-size: 20px; margin-bottom: 8px; }
        #login-box p { font-size: 14px; color: #666; margin-bottom: 24px; }
        #login-box input {
            width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 16px; margin-bottom: 16px; outline: none;
        }
        #login-box input:focus { border-color: #333; }
        #login-box button {
            width: 100%; padding: 12px; background: #1a1a1a; color: white;
            border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
        }
        #login-box button:hover { background: #333; }
        #error-msg { color: #e53e3e; font-size: 13px; margin-top: 8px; display: none; }

        /* Content */
        #content { display: none; max-width: 800px; margin: 0 auto; padding: 40px 24px 80px; }
        #content h1 { font-size: 28px; margin-bottom: 8px; line-height: 1.3; }
        #content h2 { font-size: 22px; margin-top: 40px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        #content h3 { font-size: 17px; margin-top: 28px; margin-bottom: 8px; }
        #content p { font-size: 15px; line-height: 1.7; margin-bottom: 12px; }
        #content ul, #content ol { margin-bottom: 12px; padding-left: 24px; }
        #content li { font-size: 15px; line-height: 1.7; margin-bottom: 4px; }
        #content strong { font-weight: 600; }
        #content hr { border: none; border-top: 1px solid #eee; margin: 32px 0; }
        #content a { color: #2563eb; text-decoration: none; }
        #content a:hover { text-decoration: underline; }
        #content code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        #content pre { background: #f5f5f5; padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; }
        #content pre code { background: none; padding: 0; font-size: 13px; line-height: 1.6; }
        #content table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 14px; }
        #content th { background: #f5f5f5; text-align: left; padding: 10px 12px; border: 1px solid #e0e0e0; font-weight: 600; }
        #content td { padding: 10px 12px; border: 1px solid #e0e0e0; }
        #content blockquote { border-left: 3px solid #ddd; padding-left: 16px; color: #555; margin-bottom: 12px; }
        #content img { max-width: 100%; border-radius: 8px; margin: 16px 0; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div id="login-box">
            <h1>LearnLink — Экшен-план</h1>
            <p>Введите пароль для доступа</p>
            <input type="password" id="password" placeholder="Пароль" autofocus>
            <button onclick="tryLogin()">Войти</button>
            <div id="error-msg">Неверный пароль</div>
        </div>
    </div>
    <div id="content"></div>

    <script>
        const PASS_HASH = '352d1cdec35a591faae641d652041809834dad37ee458765251a884476353405';

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function tryLogin() {
            const input = document.getElementById('password').value;
            const hash = await sha256(input);
            if (hash === PASS_HASH) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                loadContent();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') tryLogin();
        });

        async function loadContent() {
            const response = await fetch('action-plan.md');
            const md = await response.text();
            document.getElementById('content').innerHTML = marked.parse(md);
        }
    </script>
</body>
</html>
